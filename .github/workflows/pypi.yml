name: Publish Python distributions to PyPI

on: [push]

jobs:
  build-n-publish:
    name: Build and publish Python distributions to TestPyPI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # setuptools_scm needs full history (incl. tags) to derive the version
        # https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install package deps
        run: >-
          sudo apt-get install -y
          git
          tar
          make
          gcc
          python3-dev
          python3-wheel
          python3-build
          python3-setuptools
          python3-pip
          python3-libvirt
          python3-sphinx
          python3-sphinx-rtd-theme
      - name: Install dependencies
        run: pip3 install .[lint,test,docs]
      - name: Pin version without local part
        # PyPI/TestPyPI reject uploads whose version has a local segment
        # (e.g. "+gabcdef"), which setuptools_scm appends for non-tag commits.
        # setuptools_scm is only a build-system requirement, so it isn't
        # installed into this environment by the step above.
        run: |
          pip3 install setuptools_scm
          echo "SETUPTOOLS_SCM_PRETEND_VERSION=$(python3 -m setuptools_scm | cut -d'+' -f1)" >> $GITHUB_ENV
      - name: Build a binary wheel and a source tarball
        run: make release
      - name: Publish distribution to Test PyPI
        if: github.ref == 'refs/heads/main'
        # https://github.com/pypa/gh-action-pypi-publish
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository_url: https://test.pypi.org/legacy/
      - name: Publish distribution to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        # https://github.com/pypa/gh-action-pypi-publish
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
