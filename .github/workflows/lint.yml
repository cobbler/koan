name: Linting Koan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pyflakes:
    name: pyflakes formatter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # https://github.com/actions/checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install deps
        run: sudo apt-get install -y python3-pyflakes
      - name: Run pyflakes
        run: pyflakes3 *.py bin/koan bin/cobbler-register koan/*.py
  black:
    name: black formatter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # https://github.com/actions/checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Run black
        # https://github.com/psf/black
        uses: psf/black@87928e6d6761a4a6d22250e1fee5601b3998086e # 26.5.1
        with:
          options: "--check --safe --verbose"
          version: "26.5.1"
  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # https://github.com/actions/checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Lint commit messages
        # https://github.com/wagoid/commitlint-github-action
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
