name: Linting Koan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pyflakes:
    name: pyflakes formatter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # https://github.com/actions/checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install deps
        run: sudo apt-get install -y python3-pyflakes
      - name: Run pyflakes
        run: pyflakes3 *.py koan/*.py
  black:
    name: black formatter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # https://github.com/actions/checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Run black
        # https://github.com/psf/black
        uses: psf/black@87928e6d6761a4a6d22250e1fee5601b3998086e # 26.5.1
        with:
          options: "--check --safe --verbose"
          version: "26.5.1"
  isort:
    name: isort formatter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # https://github.com/actions/checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Run isort
        # https://github.com/isort/isort-action
        uses: isort/isort-action@24d8a7a51d33ca7f36c3f23598dafa33f7071326 # v1.1.1
        with:
          configuration: "--check-only --diff --profile black"
  pyright:
    name: pyright
    runs-on: ubuntu-latest
    container: registry.opensuse.org/opensuse/tumbleweed:latest
    steps:
      - name: Install package deps
        run: zypper -n in --no-recommends git tar curl python3 python3-devel python3-wheel python3-pip python3-libvirt-python gcc make virt-install
      - name: Checkout repository
        # https://github.com/actions/checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: pip3 install --break-system-packages .[lint,test]
      - name: Run Pyright
        # https://github.com/jakebailey/pyright-action
        uses: jakebailey/pyright-action@8ec14b5cfe41f26e5f41686a31eb6012758217ef # v3.0.2
  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # https://github.com/actions/checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Lint commit messages
        # https://github.com/wagoid/commitlint-github-action
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
