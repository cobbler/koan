name: Building Koan packages

on:
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      version:
        description: "Version to stamp built packages with (pinned by release.yml so packaging never has to guess from a possibly-not-yet-pushed tag)"
        required: false
        type: string

jobs:
  build-rockylinux-rpms:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # setuptools_scm needs full history (incl. tags) to derive the version
        # https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Build a RockyLinux 10 Package
        shell: 'script -q -e -c "bash {0}"'
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ inputs.version }}
        run: |
          ./docker/rpms/build-and-install-rpms.sh rl10 docker/rpms/RockyLinux10/RockyLinux10.dockerfile
      - name: Archive RPMs
        # https://github.com/actions/upload-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rpms-rockylinux
          path: |
            rpm-build/*.rpm
  build-fedora-rpms:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # setuptools_scm needs full history (incl. tags) to derive the version
        # https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Build a Fedora Package
        shell: 'script -q -e -c "bash {0}"'
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ inputs.version }}
        run: |
          ./docker/rpms/build-and-install-rpms.sh fc43 docker/rpms/Fedora/Fedora.dockerfile
      - name: Archive RPMs
        # https://github.com/actions/upload-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rpms-fedora
          path: |
            rpm-build/*.rpm
  build-opensuse-leap-rpms:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # setuptools_scm needs full history (incl. tags) to derive the version
        # https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install System dependencies
        run: sudo apt-get install -y rename
      - name: Build a openSUSE Leap 16 Package
        shell: 'script -q -e -c "bash {0}"'
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ inputs.version }}
        run: |
          ./docker/rpms/build-and-install-rpms.sh opensuse-leap docker/rpms/openSUSE_Leap/openSUSE_Leap.dockerfile
      - name: Rename RPM
        run: |
          file-rename -v -d -e 's/koan-(\d+\.\d+\.\d+)-1\.(\w+)\.rpm/koan-$1-1.leap.$2.rpm/' rpm-build/*.rpm
      - name: Archive RPMs
        # https://github.com/actions/upload-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rpms-opensuse-leap
          path: |
            rpm-build/*.rpm
  build-opensuse-tumbleweed-rpms:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # setuptools_scm needs full history (incl. tags) to derive the version
        # https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install System dependencies
        run: sudo apt-get install -y rename
      - name: Build a openSUSE Tumbleweed Package
        shell: 'script -q -e -c "bash {0}"'
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ inputs.version }}
        run: |
          ./docker/rpms/build-and-install-rpms.sh opensuse-tumbleweed docker/rpms/openSUSE_Tumbleweed/openSUSE_TW.dockerfile
      - name: Rename RPM
        run: |
          file-rename -v -d -e 's/koan-(\d+\.\d+\.\d+)-1\.(\w+)\.rpm/koan-$1-1.tw.$2.rpm/' rpm-build/*.rpm
      - name: Archive RPMs
        # https://github.com/actions/upload-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rpms-opensuse-tumbleweed
          path: |
            rpm-build/*.rpm
  build-debian-debs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # setuptools_scm needs full history (incl. tags) to derive the version
        # https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Build a Debian 13 Package
        shell: 'script -q -e -c "bash {0}"'
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ inputs.version }}
        run: |
          ./docker/debs/build-and-install-debs.sh deb13 docker/debs/debian/Debian13.dockerfile
      - name: Archive DEBs
        # https://github.com/actions/upload-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: debs-debian
          path: |
            deb-build/*.deb
  build-wheel:
    name: Build Python Wheel
    runs-on: ubuntu-latest
    # TODO: Move directly to Ubuntu - libvirt problems on GHA
    container: registry.opensuse.org/opensuse/tumbleweed:latest
    steps:
      - name: Install system dependencies
        run: >-
          zypper -n in --no-recommends
          git
          tar
          make
          python3
          python3-base
          python3-wheel
          python3-build
          python3-setuptools
          python3-pip
          python3-libvirt-python
          python3-Sphinx
          python3-sphinx_rtd_theme
          python3-netifaces
          tree
      - name: Checkout repository
        # setuptools_scm needs full history (incl. tags) to derive the version
        # https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Mark directory as safe for Git
        run: git config --global --add safe.directory /__w/koan/koan
      - name: Install dependencies
        run: pip3 install --break-system-packages  .
      - name: Build a binary wheel and a source tarball
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ inputs.version }}
        run: make release
      - name: Show tree
        run: tree
      - name: Archive Wheel
        # https://github.com/actions/upload-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheel
          path: |
            dist/*.whl
            dist/*.tar.gz
