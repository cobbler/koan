name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  determine-version:
    name: Determine next release version
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore(release):')"
    outputs:
      version: ${{ steps.dry-run.outputs.version }}
      should-release: ${{ steps.dry-run.outputs.should-release }}
    steps:
      - name: Checkout repository
        # setuptools_scm needs full history (incl. tags) to derive the version
        # https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Node.js
        # https://github.com/actions/setup-node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "lts/*"
      - name: Install release dependencies
        run: npm ci
      - name: Determine next version
        # A dry run computes the version semantic-release would publish
        # without creating the tag/release yet, so packaging can be handed
        # a real version up front instead of racing the tag's creation.
        id: dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          OUTPUT=$(npx semantic-release --dry-run 2>&1)
          set -e
          echo "$OUTPUT"
          VERSION=$(echo "$OUTPUT" | grep -ioP 'the next release version is \K[0-9]+\.[0-9]+\.[0-9]+' | head -n1)
          if [ -n "$VERSION" ]; then
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "should-release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-release=false" >> "$GITHUB_OUTPUT"
          fi

  packaging:
    name: Build packages for the upcoming release
    needs: determine-version
    if: needs.determine-version.outputs.should-release == 'true'
    uses: ./.github/workflows/packaging.yml
    with:
      version: ${{ needs.determine-version.outputs.version }}

  release:
    name: semantic-release
    runs-on: ubuntu-latest
    needs: [determine-version, packaging]
    if: needs.determine-version.outputs.should-release == 'true' && needs.packaging.result == 'success'
    steps:
      - name: Checkout repository
        # setuptools_scm needs full history (incl. tags) to derive the version
        # https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Node.js
        # https://github.com/actions/setup-node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "lts/*"
      - name: Install release dependencies
        run: npm ci
      - name: Download all built artifacts
        # https://github.com/actions/download-artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Run semantic-release
        # Publishes the same version determine-version computed (same
        # commits, so semantic-release recomputes it identically) and
        # attaches the artifacts downloaded above via .releaserc.json's
        # assets globs.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
