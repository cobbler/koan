name: Testing Koan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run_tests:
    runs-on: ubuntu-latest
    container: registry.opensuse.org/opensuse/tumbleweed:latest
    steps:
      # git must be present before checkout, or the container image has none and actions/checkout silently falls back to
      # downloading a tarball via the GitHub REST API, which has no .git dir for setuptools_scm to read.
      - name: Install package deps
        run: zypper -n in --no-recommends git tar curl python3 python3-devel python3-wheel python3-pip python3-libvirt-python gcc make virt-install
      - name: Checkout repository
        # setuptools_scm needs full history (incl. tags) to derive the version
        # https://github.com/actions/checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: pip3 install --break-system-packages .[lint,test]
      - name: Run tests
        run: pytest --cov=./koan --cov-report=term-missing --cov-report=xml:coverage.xml
      - name: Upload coverage to Codacy
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage.xml
