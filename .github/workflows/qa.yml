name: Linting Koan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pyflakes:
    name: pyflakes formatter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install deps
        run: sudo apt-get install -y python3-pyflakes
      - name: Run pyflakes
        run: pyflakes3 *.py bin/koan bin/cobbler-register koan/*.py
  black:
    name: black formatter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run black
        # https://github.com/psf/black
        uses: psf/black@87928e6d6761a4a6d22250e1fee5601b3998086e # 26.5.1
        with:
          options: "--check --safe --verbose"
          version: "26.5.1"
