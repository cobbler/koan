[build-system]
requires = ["setuptools", "setuptools_scm", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools_scm]
# Non-code configuration stays here
version_file = "koan/_version.py"
version_file_template = """# Auto-generated by setuptools_scm — do not edit
__version__ = "{version}"
__gitstamp__ = "{scm_version.node}"
__gitdate__ = "{scm_version.node_date}"
__builddate__ = "{scm_version.time}"
"""

[tool.isort]
profile = "black"
